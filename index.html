<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Shahzaib & Momna — 3 Years</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Outfit:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --blush: #f6e1d8;
    --blush-deep: #e8c4b3;
    --cream: #fbf6ef;
    --cream-warm: #f4ead9;
    --rose: #b5686a;
    --rose-deep: #8a3f45;
    --gold: #b8935a;
    --gold-soft: #d4b483;
    --ink: #3a2a26;
    --ink-soft: #6b4f48;
    --serif: "Cormorant Garamond", "Times New Roman", serif;
    --sans: "Outfit", ui-sans-serif, system-ui, sans-serif;
    --script: "Dancing Script", cursive;
    --urdu: "Noto Nastaliq Urdu", serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased; overflow-x:hidden}
  body{min-height:100vh}
  a{color:inherit}
  ::selection{background:var(--rose);color:#fff}

  /* Petals */
  .petals{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
  .petal{position:absolute;top:-40px;opacity:0;will-change:transform}
  @keyframes fall{
    0%{transform:translateY(-40px) translateX(0) rotate(0deg);opacity:0}
    10%{opacity:.9}
    90%{opacity:.7}
    100%{transform:translateY(110vh) translateX(var(--drift,60px)) rotate(var(--spin,360deg));opacity:0}
  }

  /* Password gate */
  .gate{position:fixed;inset:0;z-index:1000;background:
    radial-gradient(ellipse at 30% 20%, #f9ddd2 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, #ead6c1 0%, transparent 55%),
    var(--cream);
    display:flex;align-items:center;justify-content:center;padding:32px;
    transition:opacity .9s ease, visibility .9s}
  .gate.gone{opacity:0;visibility:hidden;pointer-events:none}
  .gate-inner{text-align:center;max-width:460px}
  .gate-inner .mark{font-family:var(--script);font-size:22px;color:var(--rose);
    letter-spacing:.02em;margin-bottom:18px}
  .gate-inner h1{font-family:var(--serif);font-weight:400;font-size:clamp(34px,5vw,54px);
    line-height:1.05;color:var(--ink);margin-bottom:10px;font-style:italic}
  .gate-inner p{font-family:var(--serif);color:var(--ink-soft);font-size:17px;margin-bottom:28px;
    font-style:italic}
  .gate-input{display:flex;gap:8px;align-items:center;justify-content:center}
  .gate-input input{font-family:var(--serif);font-size:18px;font-style:italic;
    padding:12px 16px;width:240px;border:none;border-bottom:1px solid var(--gold);
    background:transparent;color:var(--ink);text-align:center;outline:none;
    letter-spacing:.05em}
  .gate-input input::placeholder{color:var(--ink-soft);opacity:.5}
  .gate-btn{font-family:var(--sans);font-size:12px;letter-spacing:.2em;
    text-transform:uppercase;padding:12px 22px;background:var(--ink);color:var(--cream);
    border:none;cursor:pointer;transition:background .2s}
  .gate-btn:hover{background:var(--rose-deep)}
  .gate-hint{margin-top:14px;font-size:11px;color:var(--ink-soft);opacity:.6;
    letter-spacing:.08em;text-transform:uppercase}
  .gate-err{color:var(--rose-deep);font-style:italic;font-family:var(--serif);
    margin-top:14px;min-height:18px;font-size:14px}

  /* Hero */
  .hero{position:relative;min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:80px 32px;text-align:center;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(246,225,216,.85) 0%, transparent 60%),
      radial-gradient(ellipse at 85% 85%, rgba(232,196,179,.6) 0%, transparent 60%),
      var(--cream)}
  .hero-ornament{font-family:var(--script);font-size:22px;color:var(--rose);
    letter-spacing:.02em;margin-bottom:18px;opacity:0;animation:fadeUp 1.2s .2s forwards}
  .hero-names{font-family:var(--serif);font-weight:300;font-style:italic;
    font-size:clamp(64px, 12vw, 168px);line-height:.95;color:var(--ink);
    letter-spacing:-.02em;opacity:0;animation:fadeUp 1.4s .5s forwards}
  .hero-names .amp{color:var(--rose);font-weight:400;display:inline-block;padding:0 .1em;
    transform:translateY(.05em)}
  .hero-sub{display:flex;align-items:center;gap:18px;margin-top:32px;opacity:0;
    animation:fadeUp 1.4s .9s forwards}
  .hero-sub .line{width:60px;height:1px;background:var(--gold)}
  .hero-sub .date{font-family:var(--sans);font-size:12px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--ink-soft)}
  .hero-years{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink-soft);
    margin-top:34px;opacity:0;animation:fadeUp 1.4s 1.2s forwards}
  .hero-years b{color:var(--rose-deep);font-weight:500;font-style:normal;
    font-family:var(--serif);font-size:26px}
  .scroll-cue{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
    font-family:var(--sans);font-size:10px;letter-spacing:.35em;text-transform:uppercase;
    color:var(--ink-soft);opacity:0;animation:fadeUp 1.4s 1.8s forwards, bob 2.4s 2.4s infinite}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}

  /* Letter section */
  .letter{padding:140px 32px;background:linear-gradient(180deg, var(--cream) 0%, #f4ead9 100%);
    display:flex;flex-direction:column;align-items:center}
  .letter-label{font-family:var(--sans);font-size:11px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--gold);margin-bottom:28px}
  .letter-body{font-family:var(--serif);font-style:italic;font-weight:300;
    font-size:clamp(28px, 4vw, 46px);line-height:1.45;color:var(--ink);
    text-align:center;max-width:820px;min-height:4em}
  .letter-urdu{font-family:var(--serif);font-style:italic;font-size:clamp(22px, 2.8vw, 32px);
    color:var(--rose-deep);margin-top:26px;text-align:center;max-width:780px;
    line-height:1.55;font-weight:400;min-height:2em}
  .caret{display:inline-block;width:2px;height:.9em;background:var(--rose);
    margin-left:4px;vertical-align:middle;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:0}}
  .letter-sign{margin-top:50px;font-family:var(--script);font-size:36px;color:var(--rose-deep);
    opacity:0;transform:translateY(10px);transition:opacity 1s 1s, transform 1s 1s}
  .letter-sign.show{opacity:1;transform:translateY(0)}

  /* Countdown */
  .countdown{padding:120px 32px;background:var(--cream);
    display:flex;flex-direction:column;align-items:center;text-align:center}
  .section-eyebrow{font-family:var(--sans);font-size:11px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--gold);margin-bottom:20px}
  .section-title{font-family:var(--serif);font-weight:300;font-style:italic;
    font-size:clamp(42px, 6vw, 72px);line-height:1.05;color:var(--ink);
    margin-bottom:12px;letter-spacing:-.01em}
  .section-title .accent{color:var(--rose)}
  .section-sub{font-family:var(--serif);font-style:italic;color:var(--ink-soft);
    font-size:19px;margin-bottom:60px;max-width:520px}
  .countdown-grid{display:grid;grid-template-columns:repeat(4,minmax(0,120px));gap:10px}
  .cd-unit{background:rgba(255,255,255,.55);border:.5px solid var(--blush-deep);
    padding:22px 8px 18px;border-radius:2px;position:relative;overflow:hidden}
  .cd-unit::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:28px;height:1px;background:var(--gold)}
  .cd-num{font-family:var(--serif);font-weight:400;font-size:clamp(38px,5vw,52px);
    color:var(--rose-deep);font-variant-numeric:tabular-nums;line-height:1;font-style:italic}
  .cd-lbl{font-family:var(--sans);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--ink-soft);margin-top:10px}
  .cd-today{margin-top:40px;font-family:var(--serif);font-style:italic;font-size:22px;
    color:var(--rose-deep);max-width:560px;line-height:1.5}

  /* Timeline */
  .timeline{padding:140px 32px;background:linear-gradient(180deg,#f4ead9 0%, var(--cream) 100%);
    display:flex;flex-direction:column;align-items:center}
  .timeline-inner{max-width:900px;width:100%;margin-top:60px;position:relative}
  .timeline-inner::before{content:"";position:absolute;left:50%;top:20px;bottom:20px;
    width:1px;background:linear-gradient(180deg,transparent,var(--gold) 12%,var(--gold) 88%,transparent);
    transform:translateX(-.5px)}
  .tl-item{display:grid;grid-template-columns:1fr 80px 1fr;gap:24px;margin-bottom:80px;
    align-items:flex-start}
  .tl-item:last-child{margin-bottom:0}
  .tl-dot{grid-column:2;justify-self:center;width:14px;height:14px;border-radius:50%;
    background:var(--cream);border:1.5px solid var(--rose);margin-top:12px;position:relative;z-index:2}
  .tl-dot::after{content:"";position:absolute;inset:-6px;border-radius:50%;
    border:1px solid var(--rose);opacity:.3}
  .tl-date{grid-column:1;text-align:right;font-family:var(--sans);font-size:11px;
    letter-spacing:.3em;text-transform:uppercase;color:var(--gold);padding-top:14px}
  .tl-body{grid-column:3}
  .tl-item.reverse .tl-date{grid-column:3;text-align:left;padding-top:14px}
  .tl-item.reverse .tl-body{grid-column:1;text-align:right}
  .tl-title{font-family:var(--serif);font-style:italic;font-weight:400;font-size:30px;
    color:var(--ink);margin-bottom:8px;line-height:1.15}
  .tl-text{font-family:var(--serif);font-size:17px;line-height:1.65;color:var(--ink-soft)}
  .tl-text em{color:var(--rose-deep);font-weight:400}

  /* Gallery */
  .gallery{padding:140px 32px;background:var(--cream);display:flex;flex-direction:column;
    align-items:center}
  .g-grid{display:grid;gap:18px;width:100%;max-width:1180px;margin-top:60px;
    grid-template-columns:repeat(6, 1fr);grid-auto-rows:180px}
  .g-item{position:relative;overflow:hidden;border-radius:3px;background:var(--blush);
    box-shadow:0 1px 0 rgba(0,0,0,.02), 0 20px 40px -24px rgba(138,63,69,.22);
    cursor:pointer;transition:transform .5s ease}
  .g-item:hover{transform:translateY(-3px)}
  .g-item.wide{grid-column:span 3}
  .g-item.tall{grid-row:span 2}
  .g-item.sq{grid-column:span 2;grid-row:span 2}
  .g-item.slim{grid-column:span 2}
  .ph{position:absolute;inset:0;
    background-image:repeating-linear-gradient(135deg, rgba(184,147,90,.18) 0, rgba(184,147,90,.18) 1px, transparent 1px, transparent 14px),
      linear-gradient(135deg, #f6e1d8 0%, #e8c4b3 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .ph-tag{font-family:"SF Mono","Courier New",monospace;font-size:10px;color:var(--rose-deep);
    letter-spacing:.14em;text-transform:uppercase;text-align:center;line-height:1.6;
    background:rgba(251,246,239,.75);padding:6px 10px;border:.5px dashed var(--rose)}
  .g-caption{position:absolute;inset:0;background:linear-gradient(180deg,
    rgba(58,42,38,0) 40%, rgba(58,42,38,.88) 100%);
    display:flex;flex-direction:column;justify-content:flex-end;padding:20px 22px;
    opacity:0;transition:opacity .5s ease;color:#fbf6ef}
  .g-item:hover .g-caption{opacity:1}
  .g-cap-label{font-family:var(--sans);font-size:10px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px}
  .g-cap-title{font-family:var(--serif);font-style:italic;font-size:24px;line-height:1.2;
    color:#fbf6ef}

  /* Shayari */
  .shayari{padding:160px 32px;background:
    radial-gradient(ellipse at 50% 50%, rgba(232,196,179,.55) 0%, var(--cream) 70%);
    text-align:center;display:flex;flex-direction:column;align-items:center}
  .shayari-frame{max-width:680px;position:relative;padding:60px 40px}
  .shayari-frame::before,.shayari-frame::after{content:"";position:absolute;width:60px;
    height:60px;border:1px solid var(--gold);opacity:.6}
  .shayari-frame::before{top:0;left:0;border-right:none;border-bottom:none}
  .shayari-frame::after{bottom:0;right:0;border-left:none;border-top:none}
  .shayari-label{font-family:var(--sans);font-size:11px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--gold);margin-bottom:32px}
  .shayari-text{font-family:var(--serif);font-style:italic;font-weight:300;
    font-size:clamp(22px,2.6vw,28px);line-height:1.9;color:var(--ink)}
  .shayari-text span{display:block}
  .shayari-text .highlight{color:var(--rose-deep);font-weight:400}
  .shayari-text .spacer{height:20px}
  .shayari-attr{margin-top:36px;font-family:var(--sans);font-size:11px;letter-spacing:.25em;
    text-transform:uppercase;color:var(--ink-soft);opacity:.7}

  /* Closing */
  .closing{padding:160px 32px 100px;background:linear-gradient(180deg, var(--cream) 0%, #ead3c1 100%);
    text-align:center;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
  .closing-orn{font-family:var(--script);font-size:26px;color:var(--rose);margin-bottom:20px}
  .closing-title{font-family:var(--serif);font-weight:300;font-style:italic;
    font-size:clamp(48px, 7vw, 86px);line-height:1.05;color:var(--ink);max-width:880px;
    letter-spacing:-.01em}
  .closing-title .accent{color:var(--rose-deep)}
  .closing-sig{margin-top:60px;font-family:var(--script);font-size:56px;color:var(--rose-deep);
    line-height:1}
  .closing-date{margin-top:28px;font-family:var(--sans);font-size:11px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--ink-soft)}
  .closing-heart{margin-top:34px;font-size:22px;color:var(--rose);animation:beat 2s infinite}
  @keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.18)}30%{transform:scale(1)}
    45%{transform:scale(1.12)}60%{transform:scale(1)}}

  /* Fade-in on scroll */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 1s ease, transform 1s ease}
  .reveal.in{opacity:1;transform:translateY(0)}

  /* Mobile */
  @media (max-width: 780px){
    .countdown-grid{grid-template-columns:repeat(4, 1fr);gap:6px}
    .cd-unit{padding:18px 4px 14px}
    .g-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:160px}
    .g-item.wide,.g-item.sq,.g-item.slim{grid-column:span 2}
    .g-item.tall{grid-row:span 1}
    .timeline-inner::before{left:20px}
    .tl-item, .tl-item.reverse{grid-template-columns:40px 1fr;gap:16px}
    .tl-dot{grid-column:1;justify-self:center;margin-top:10px}
    .tl-date, .tl-item.reverse .tl-date{grid-column:2;grid-row:1;text-align:left;padding-top:0;margin-bottom:6px}
    .tl-body, .tl-item.reverse .tl-body{grid-column:2;grid-row:2;text-align:left}
  }
</style>
</head>
<body>

<div id="root"></div>
